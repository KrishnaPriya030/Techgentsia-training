<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocatone</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../cssfolder/style1.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">VOCATONE</div>

    <div class="navlinks">
      <span class="en">EN</span>
      <i class="fa-solid fa-magnifying-glass"></i>
      <i class="fa-regular fa-user"></i>
      <i class="fa-solid fa-bars"></i>
    </div>
  </nav>
</header>

<main>
  <section class="hero">

    <!-- LEFT GLASS CARD -->
    <div class="lefthero">
      <img src="../images/anime-character-playing-guitar (1).jpg"
           alt="music"
           class="musicimg">

      <p id="music">City Lights in Your Eyes</p>
      <p id="caption">Gardenia</p>

      <div class="audio">
        <i class="fa-solid fa-rotate-right"></i>
        <i class="fa-solid fa-backward-step"></i>
        <i class="fa-solid fa-play"></i>
        <i class="fa-solid fa-forward-step"></i>
        <i class="fa-solid fa-volume-high"></i>
      </div>

      <div class="progress">
        <span>02:10</span>
        <input type="range">
        <span>03:45</span>
      </div>
    </div>

    <!-- RIGHT TEXT -->
    <div class="righthero">
      <div class="write">
        <h1 class="head" style="font-size: 60px;">
          Play Your<br>
          Beloved Music
        </h1>

        <p style="font-size: 15px;">
          Selected music from various genres, artists and composers<br>
          Play now, completely free and convenient.
        </p>
      </div>
      <div class="images">
        <div class="glass" ><img src="../images/anime-character-playing-guitar (1).jpg" alt="Anime character playing guitar with a joyful expression in a vibrant music-themed setting"><p class="sname">Lazy songs</p></div>
        
        <div class="glass" ><img src="../images/coffee-with-latte-art-cake.jpg" alt="apple music"><p class="sname">Mood songs</p></div>

        <div class="glass" ><img src="../images//anime-character-playing-guitar.jpg" alt="youtube music"><p class="sname">Disco songs</p></div>
        
        
        

      </div>
    </div>

  </section>
</main>

</body>
</html>
